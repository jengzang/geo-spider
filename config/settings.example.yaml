app:
  env: development
  log_level: INFO

paths:
  sqlite_path: data/processed/geonode_spider.db
  export_dir: data/exports
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed

crawler:
  request_timeout: 15
  request_retries: 3
  sleep_min_seconds: 0.5
  sleep_max_seconds: 1.5
  backoff_base_seconds: 1.0

proxy:
  enabled: false
  pool: []

geo:
  provider: mock
  api_key: ""
  endpoint: ""

dmfw:
  base_url: https://dmfw.mca.gov.cn
  page_size: 100
  partition_threshold: 3000
  search_type: 模糊匹配

run:
  cli-multi: python scripts/run_dmfw_chars.py --json config/config1-1d5.json --json config/config1d5-2.json --json config/config2-3.json --json config/config3+.json --worker 4

  cli-single: python scripts/run_dmfw_chars.py --json config/config.json

  cli-all: python scripts/run_dmfw_chars.py --json config/config0d7-1.json --json config/config1-1d35.json --json config/config1d35-1d7.json --json config/config1d7-2.json --json config/config2-2d4.json --json config/config2d4-3.json --worker 6
